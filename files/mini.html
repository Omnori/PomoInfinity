<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Pomori Mini</title>
  <link rel="shortcut icon" href="images/logo/logo.png" type="image/x-icon" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0,400;0,700;1,400;1,700&family=Gorditas:wght@400;700&family=Lexend:wght@300;400;500;700&display=swap"
    rel="stylesheet" />
</head>

<body class="mini">
  <header>
    <div class="logoicon">
      <img src="images/logo/logo-48.png" alt="Pomori" />
    </div>
    <span>Pomori</span>
  </header>
  <div id="mini">
    <div class="clockname" id="mininame">No active task</div>
    <div class="maintime">
      <span id="mainhrs">00</span><span style="position: relative; bottom: 10px">:</span><span id="mainmin">00</span>
    </div>
    <div class="miniclockdet">
      <img src="images/play.png" id="minitoggle" class="playbtn" alt="Toggle Timer" />
      <img src="images/skip.png" id="miniskip" class="restartbtn" alt="Skip Task" />
    </div>
  </div>
</body>
<script src="mini.js"></script>

</html>
